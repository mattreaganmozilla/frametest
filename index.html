<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Green Frame</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      box-sizing: border-box;
      border: 10px solid green;
      min-height: 100vh;

      /* Center the input field */
      display: flex;
      align-items: center;
      justify-content: center;

      background: white;
    }

    input {
      font-size: 20px;
      padding: 12px 16px;
      width: 80%;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <input
    type="text"
    placeholder="Tap here to type..."
    autofocus
  />

</body>
</html>
